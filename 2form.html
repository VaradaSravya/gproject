<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <fieldset>
            <legend>Login</legend>
            <label>Username</label><br>
            <input type="text" placeholder="enter your username"><br>
            <label>Password</label><br>
            <input type="text" placeholder="enter your password"><br>
            <label>Email</label><br>
            <input type="text" placeholder="enter your email">

        </fieldset><br>
        <fieldset>
            <legend>Options</legend>
            <label>gender</label>
            <input type="radio" name="gender" value="male">Male
            <input type="radio" name="gender" value="female">Female
        </fieldset><br>
        <fieldset>
            <legend>Favorite food</legend>
            <label>Choose food</label>
            <select>
                <optgroup label="Fast food">
                    <option>select the food</option>
                    <option>burger</option>
                    <option>Pizza</option>
                
                </optgroup>
                <optgroup label="Indian food">
                    <option>Dal</option>
                    <option>Rice</option>

                </optgroup>
            </select>
        </fieldset><br>
        <fieldset>
            <label>Fruits</label><br><br>
            <label>Select the Fruits</label>
            <select>
                <option selected >select the fruit</option>
                <option>Apple</option>
                <option>Mango</option>
                <option>Strawberry</option>
            </select>

        </fieldset><br>
        <fieldset>
            <legend>Feedback</legend>
            <textarea rows="10" cols="40">enter the feedback </textarea>

        </fieldset><br>
        <fieldset>
            <button>submitt</button>
            <button>resett</button>
        </fieldset>
    </form>
</body>
</html>
