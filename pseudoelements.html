<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p::first-letter{
        color:palevioletred;
        background-color: aqua;
    }
    p::first-line{
        background-color: aquamarine;
    }
    p::before{
        content:"❤️"
    }
    p::after{
        content:"💕"
    }
    p::selection{
        background-color: bisque;
    }
    ul li::marker{
        color: beige;
    }



    </style>
    
</head>
<body>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Cum rerum neque quas hic minima maiores quibusdam quidem deleniti, sequi dolorum porro, totam tenetur, sapiente modi ea animi blanditiis sit voluptatum.</p>
    <ul>
        <li>1</li>
        <li>2</li>
        <li>3</li>
    </ul>
</body>
</html>
