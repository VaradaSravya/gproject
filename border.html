<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            border: 5px aqua solid;
        }
        p{
            border:10px dotted yellow;
            width:400px;
            color: blue;
        }
        h2{
            border-top:5px red dashed;
            border-right: 5px blue dotted;
            border-left:5px yellow solid;
            border-bottom:5px violet dotted;
            width:500px;
        }
        h3{
            padding:10px 30px 20px 50px;
            background-color: aqua;
        }
        h4{
            padding:40px;
            background-color: blanchedalmond;
            color: blue;
        }
    </style>
        
</head>
<body>
    <h1>Hlo everyone.This is Sravya Varada</h1>
    <p>BTech graduate</p>
    <h2>Intro to Border properties</h2>
    <h3>Its time to learn padding properties</h3>
    <h4>only topbottom and rightleft</h4>
</body>
</html>
