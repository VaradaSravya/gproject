<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .content{
            background-color: aqua;
            height:500px;
            width:500px;
            margin:100px;
            position:relative;
        }
        .box{
            width:100px;
            height:100px;
        }
        .red{
            background-color: red;
            position:relative;
            top:0px;
            left:50px;
        }
        .green{
            background-color: green;
            position:absolute;
            top:0px;
            right:60px;
        }
        .orange{
            background-color: orange;
            position:fixed;
        }
        .yellow{
            background-color: yellow;
            position:sticky;
        }
        body{
            width:300vw;
        }
    </style>
</head>
<body>
    <div class="content">
        <div class="box red">relative</div>
        <div class="box green">absolute</div>
        <div class="box orange">fixed</div>
        <div class="box yellow">sticky</div>
    </div>
</body>
</html>
