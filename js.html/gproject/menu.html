    <style>
    *{
            box-sizing: border-box;
            padding:0px;
            margin:0px;
        }
        :root {
            --primary-green: #2d5a27;
            --light-bg: #f4f7f1;
            --white: #ffffff;
            --text-dark: #333333;
            --accent-gray: #777777;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--light-bg);
            color: var(--text-dark);
        }

        nav {
            background-color: var(--white);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position:fixed;
            min-width: 100vw;
         
        
        }

        .logo {
            margin-left: 3rem;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-green);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-links {
           justify-content: space-around;
            list-style: none;
            display: flex;
           
           
        }
       
        
        .nav-links a {
            margin-right:4rem;
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary-green);
        }
   
    header {
            padding: 55px;
           margin-bottom: -60px;
            text-align: center;
            
        }

        header h1 {
            background-color: green;
            padding:0.5rem;
            font-size: 1.7rem;
            color:white;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            min-width: 90vw;
        }

    .container{
        min-width: 60vw;
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap:20px;
        padding:20px;
    }
    .card{
        background-color: white;
        border-radius:10px;
        box-shadow: 0.4px 8px rgba(0.1,0.1,0.1,0.1);
        text-align: center;
        padding: 15px;
        }
    .card img{
        width:100%;
        height:100px;
        border-radius:10px;
        object-fit:cover;
    }
    .card h3{
        color:green;
        font-size:18px;
        margin:5px;
    }
    .Price{
        color: green;
        font-size: 18px;
        margin:5px;
    }
    .btn{
        background-color: green;
        color: white;
        border:none;
        border-radius:20px;
        padding:10px 20px;
    }
    .btn:hover{
        background-color: darkgreen;
    }
    
    </style>
