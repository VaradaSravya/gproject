       *{
            box-sizing: border-box;
            padding:0px;
            margin:0px;

        :root {
            --primary-green: #2d5a27;
            --light-bg: #f4f7f1;
            --white: #ffffff;
            --text-dark: #333333;
            --accent-gray: #777777;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--light-bg);
            color: var(--text-dark);
        }

        nav {
            margin-bottom: -20px;
            background-color: var(--white);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position:fixed;
            min-width: 100vw;
            margin:0;

        .logo {
            margin-left: 3rem;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-green);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-links {
           justify-content: space-around;
            list-style: none;
            display: flex;
           
        }

            margin-right:4rem;
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary-green);
        
        }
