<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        *{
            box-sizing: border-box;
            padding:0px;
            margin:0px;
        }
        :root {
            --primary-green: #2d5a27;
            --light-bg: #f4f7f1;
            --white: #ffffff;
            --text-dark: #333333;
            --accent-gray: #777777;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--light-bg);
            color: var(--text-dark);
        }

        nav {
            margin-bottom: -20px;
            background-color: var(--white);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position:fixed;
            min-width: 100vw;
            margin:0;
        
        }

        .logo {
            margin-left: 3rem;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-green);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-links {
           justify-content: space-around;
            list-style: none;
            display: flex;
        }
       
        
        .nav-links a {
            margin-right:4rem;
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary-green);
        }

    
        header {
           margin-bottom: -45px;
            text-align: center;
            
        }

        header h1 {
            
            padding:3.5rem;
            font-size: 1.7rem;
            color: var(--primary-green);
            text-transform: uppercase;
            letter-spacing: 1px;
            
        }

        .container {
            
        
            border:var(--accent-gray) solid 2px;
            border-radius: 1rem;
            max-width: 1100px;
            margin: 0 auto;
            padding: 6px;
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 20px;
        }

        .card {
            
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-image {
            width: 100%;
            height:150px;
            background-color: #e0e0e0;
            object-fit: cover;
        }

        .card-content {
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .card-text h2 {
            margin: 0;
            font-size: 1rem;
        }

        .card-text p {
            margin: 3px;
            color: var(--accent-gray);
            font-size: 0.9rem;
        }

        .shop-btn {
            background-color: #e8f0e6;
            color: var(--primary-green);
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
        }

        .shop-btn:hover {
            background-color: var(--primary-green);
            color: white;
        }
    </style>
</head>
