<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            box-sizing: border-box;
            margin:0px;
            padding:0px;
        }
        .container{
            background-color: rgb(87, 88, 88);
            display:flex;
            padding:10px;
            height: 500px;
            width:800px;
            gap:10px;
        }
        .left{
            background-color: aquamarine;
            flex-grow: 2;

        }
        .right{
            display:flex;
            flex-direction: column;
            flex-grow: 3;
            gap:10px;
        }
        .top,.bottom{
            background-color: aquamarine;
            flex-grow: 1;
        }
        .middle{
            display:flex;
            flex-grow: 1;
            gap:10px;
        }
        .middle div{
            background-color: aquamarine;
            flex-grow: 1;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="left">Flexbox</div>
        <div class="right">
            <div class="top">top</div>
            <div class="middle">
                <div>y</div>
                <div>v</div>
            </div>
            <div class="bottom">bottom</div>
        </div>
    </div>
</body>
</html>
